<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #73ba75;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #73ba75;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Job Application Form</h2>
        <form action="display.php" method="GET">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number:</label>
            <input type="phone" id="phone" name="phone" required>

            
            <label for="age">Age:</label>
                   <input type="date" 
    
       max="2008-01-01" 
       min="1958-12-31" required>


  
<!-- 
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="1" max="120" required> -->

               <label for="address">Address:</label>
            <input type="address" id="address" name="address" required>

            <label for="topic">Gender:</label>
            <select id="topic" name="topic">
                <option value="" disabled selected></option>
                <option value="Female">Female</option>
                <option value="Male">Male</option>
            </select>

            <label for="job">Desired Job Title:</label>
            <input type="text" id="job" name="job" required>

              <label for="available">Availability:</label>
            <select id="available" name="available">
                  <option value="" disabled selected></option>
                <option value="Fulltime">Full-time</option>
                <option value="Parttime">Part-time</option>
            </select>
               <label for="locate">Willingness To Relocate:</label>
            <select id="locate" name="locate">
                 <option value="" disabled selected></option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>



            <label for="message">Message (optional):</label>
            <input type="text" id="message" name="message" placeholder="Notes">

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
